function answerNow(q){
  if(!chosen)return;
  // Anulada não tem resposta certa (recurso 3). A resposta é registrada — as
  // estatísticas públicas são por ALTERNATIVA e o gatilho do banco só olha
  // `resposta`, então elas seguem válidas —, mas a questão não entra no ciclo
  // de revisão nem nas contas do Mapa (ver entraNaEstatistica).
  const semGabarito=!q.gabarito;
  const correta=!semGabarito&&chosen===q.gabarito;
  const at=new Date().toISOString();
  run.respostas[q.id]=chosen;
  let r=null;
  if(!semGabarito){
    // retrato do agendamento antes desta resposta: é a partir dele que os botões
    // "Chutei / Sabia / Foi fácil" reagendam, sem empilhar repetições
    run.revAntes=run.revAntes||{};
    if(run.revAntes[q.id]===undefined)run.revAntes[q.id]=reviews.get(q.id)||null;
    run.notaRev=run.notaRev||{};run.notaRev[q.id]=correta?1:0;
  }
  saveRun();
  answers.set(q.id,{resposta:chosen,correta,at});
  if(!semGabarito)r=aplicaRevisao(q.id,correta?1:0,run.revAntes[q.id]);   // acertou = Bom · errou = volta amanhã
  focoApos="prox";                                 // "Responder" deixa de existir ao revelar
  render();
  announce(semGabarito
    ? "Questão anulada, sem gabarito. Sua resposta não entra nas estatísticas."
    : (correta?"Correto. Gabarito "+q.gabarito:"Incorreto. Você marcou "+chosen+". Gabarito "+q.gabarito)+". Revisão "+textoIntervalo(r.intervalo));
  push({method:"POST",path:"/rest/v1/answers?on_conflict=user_id,question_id",
    prefer:"resolution=merge-duplicates,return=minimal",
    body:{user_id:sess().user_id,question_id:q.id,resposta:chosen,correta,answered_at:at}});
}
/** Finaliza o simulado PERGUNTANDO antes, dizendo quantas ficam em branco.
 *  Usada pelo botão "Finalizar agora" e pelo Enter na última questão — o
 *  Enter não pode corrigir um simulado por acidente. O botão "Ir para
 *  correção" continua direto: ali a intenção é explícita. */
async function confirmaFinalizaSim(list){
  const branco=list.length-Object.keys(run.respostas).length;
  if(await askConfirm("Finalizar e corrigir?",
    branco?plural(branco,"questão ficará em branco","questões ficarão em branco")+" e "+(branco===1?"contará":"contarão")+" como não respondidas."
          :"Todas as questões foram respondidas.",
    {okText:"Corrigir agora"}))finalizeSim(list);
}
function finalizeSim(list){
  const at=new Date().toISOString();const rows=[];
  // O mesmo retrato pré-resposta que answerNow grava: é a base dos chips
  // "Chutei / Sabia / Foi fácil" quando a pessoa reabre a questão pela tela
  // de resultado. Sem ele, o schedBox caía no review JÁ atualizado e o SM-2
  // rodava em cima do SM-2 — o exato bug que o comentário de schedBox
  // documenta como corrigido, vivo só neste caminho.
  run.revAntes=run.revAntes||{};run.notaRev=run.notaRev||{};
  for(const q of list){
    const r=run.respostas[q.id];if(!r)continue;
    // `pickSimulado` já exclui anuladas; a guarda mantém os DOIS caminhos de
    // resposta com a mesma regra, que é a lição do bug do SM-2 em dobro.
    const semGabarito=!q.gabarito;
    const correta=!semGabarito&&r===q.gabarito;
    answers.set(q.id,{resposta:r,correta,at});
    if(!semGabarito){
      if(run.revAntes[q.id]===undefined)run.revAntes[q.id]=reviews.get(q.id)||null;
      run.notaRev[q.id]=correta?1:0;
      aplicaRevisao(q.id,correta?1:0,run.revAntes[q.id]);
    }
    rows.push({user_id:sess().user_id,question_id:q.id,resposta:r,correta,answered_at:at});
  }
  run.done=true;if(run.tempoFinal==null)run.tempoFinal=Date.now()-run.startedAt;
  stopTimer();saveRun();render();
  if(rows.length)push({method:"POST",path:"/rest/v1/answers?on_conflict=user_id,question_id",
    prefer:"resolution=merge-duplicates,return=minimal",body:rows});
}
function toggleMark(q){

    ? {method:"DELETE",path:"/rest/v1/marks?user_id=eq."+sess().user_id+"&question_id=eq."+q.id}
    : {method:"POST",path:"/rest/v1/marks?on_conflict=user_id,question_id",

}

/** Comentários são do acervo, não da conta: um geral por questão e um por
 *  alternativa errada, reaproveitados por todos enquanto valerem. */
let explErro=new Set();      // permite exatamente uma nova tentativa por questão
async function loadExplan(qid){
  explLoaded.add(qid);
  try{
    // explanations_pub, não explanations: a view entrega só o vigente e ativo,
    // e devolve provider/modelo/data vazios para quem não é admin. O filtro de
    // validade também saiu do navegador — um relógio adiantado escondia texto
    // bom, um atrasado mostrava vencido.
    const rows=await apiJson("/rest/v1/explanations_pub?select=alternativa,texto,provider,modelo,criado_em,seq&question_id=eq."+qid+"&order=seq.desc");
    if(!rows||!rows.length)return;
    const pack={};
    rows.forEach(r=>{
      const k=r.alternativa||"geral";
      if(!pack[k])pack[k]=r;                 // seq desc: o primeiro é o mais novo
    });
    if(Object.keys(pack).length){explan.set(qid,Object.assign(explan.get(qid)||{},pack));render()}
  }catch(e){
    // falha de rede não pode condenar a questão a nunca mais buscar comentário;
    // uma segunda chance, e só (senão cada render viraria uma tentativa nova)
    if(!explErro.has(qid)){explErro.add(qid);explLoaded.delete(qid)}
  }
}
async function pedirExplan(qid,alt){
  // Esta chamada não passa por api() (é Edge Function, não PostgREST), mas
  // precisa da MESMA disciplina de token: com a aba aberta por mais de uma
  // hora, o clique em "Buscar explicação" falhava com "HTTP 401" e parecia
  // defeito da IA — e voltava a funcionar sozinho assim que qualquer outra
  // ação renovava a sessão. Falso negativo intermitente, impossível de relatar.
  const chamar=tk=>fetch(url()+"/functions/v1/"+IA_FN,{method:"POST",
    headers:{apikey:key(),Authorization:"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify({question_id:qid,alternativa:alt||undefined})});
  let r=await chamar(await tokenFresco());
  if(r.status===401&&await refresh())r=await chamar(await tokenFresco());
  const d=await r.json().catch(()=>({}));
  if(!r.ok||d.error)throw new Error(d.error||("HTTP "+r.status));
  return d;
}
/** Duas idas ao servidor, e não uma.
 *
 *  A explicação da questão e a da alternativa levam alguns segundos cada. Vindo
 *  juntas, a pessoa encarava a tela parada pela soma das duas para só então ver
 *  a primeira linha. Separadas, a fundamentação entra assim que fica pronta e a
 *  análise da alternativa ocupa um cartão de espera logo abaixo — o tempo total
 *  é o mesmo, o tempo até a primeira palavra cai pela metade. */
async function explainNow(q,alt){
  const pack=()=>explan.get(q.id)||{};
  try{
    if(!pack().geral){
      busyIA="geral";render();
      const d=await pedirExplan(q.id,null);
      if(d.geral){const p=pack();p.geral=d.geral;explan.set(q.id,p)}
      if(d.aviso&&ehAdmin)toast(d.aviso);
      announce("Fundamentação carregada");
    }
    if(alt&&!pack()[alt]){
      busyIA="alt";render();
      const d=await pedirExplan(q.id,alt);
      if(d.alternativa){const p=pack();p[alt]=d.alternativa;explan.set(q.id,p)}
      if(d.aviso&&ehAdmin)toast(d.aviso);
      announce("Análise da alternativa carregada");
    }
  }catch(e){toast("Não consegui buscar a explicação: "+e.message)}
  busyIA=null;render();
}

           el("p",null,"Só entram questões que você respondeu. As intocadas não contam nem a favor nem contra — por isso o aproveitamento de uma disciplina que você mal começou oscila muito."),
           el("p",null,"A Evolução agrupa por dia local: responder às 22h no Brasil conta como hoje, não como amanhã. Como cada questão guarda só a sua última resposta, refazer hoje uma questão antiga move aquela questão para a coluna de hoje."),
           el("p",null,"“Onde focar” aponta as disciplinas abaixo de 60% com pelo menos 3 questões respondidas. Abaixo de 3, o número ainda é ruído."),
           el("p",null,"Questões anuladas pela banca não entram em nenhuma destas contas. Elas não têm resposta certa — se contassem, só puxariam o seu aproveitamento para baixo sem dizer nada sobre o que você sabe."));
  d.append(b);como.append(d);w.append(como);
  return w;
}
function evolucao(){
  const by={};
  answers.forEach((a,id)=>{
    if(!entraNaEstatistica(id))return;      // anuladas ficam de fora (recurso 3)
    if(!a.at)return;
    const dt=new Date(a.at);if(isNaN(dt))return;
    // dia local: responder 22h no Brasil não pode contar como o dia seguinte (UTC)
    const d=dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
    (by[d]||(by[d]={n:0,ok:0}));by[d].n++;if(a.correta)by[d].ok++;
  });
  return Object.entries(by).sort((a,b)=>a[0]<b[0]?-1:1).slice(-14)
    .map(([d,s])=>({label:d.slice(8,10)+"/"+d.slice(5,7),pct:Math.round(s.ok/s.n*100),ok:s.ok,n:s.n}));
}
function agg(keyfn){
  const by={};
  answers.forEach((a,id)=>{
    const q=qById.get(id);if(!q||q.anulada)return;   // anuladas ficam de fora (recurso 3)
    const k=keyfn(q);if(!k)return;
    (by[k]||(by[k]={n:0,ok:0}));by[k].n++;if(a.correta)by[k].ok++;
  });
  return Object.entries(by).map(([area,s])=>({area,n:s.n,ok:s.ok,pct:Math.round(s.ok/s.n*100)}))
    .sort((a,b)=>a.pct-b.pct||b.n-a.n);
}
function grupo(title,rows,foco,nota){
  const box=el("div");
  box.append(el("h2","section-title",title));
  if(foco){
    const fr=rows.filter(r=>r.pct<60&&r.n>=3);
    if(fr.length){
      const fb=el("div","focus-box");
      fb.append(el("h3",null,"▲ Onde focar"));
      fb.append(el("p",null,"Abaixo de 60% em: "+fr.slice(0,3).map(r=>r.area).join(", ")+(fr.length>3?" e outras":"")+"."));
      const b=el("button","btn primary","Treinar a mais fraca");b.style.marginTop="12px";
      b.onclick=()=>{filter=blankFilter();filter.disciplinas=[fr[0].area];view="estudar";mode="montar";selectTab("estudar")};
      fb.append(b);box.append(fb);
    }
  }
  box.append(el("p","section-note",nota));
  const card=el("div","card");card.style.padding="6px 18px";
  rows.forEach(r=>{
    const row=el("div","bar-row");
    const head=el("div","bar-head");
    const nm=el("div","name",r.area);
    if(foco&&r.pct<60&&r.n>=3){const t=el("span","foco-tag","FOCO");nm.append(t)}
    head.append(nm,el("div","val",r.ok+"/"+r.n+" · "+r.pct+"%"));
    const tr=el("div","track");
    tr.setAttribute("role","img");tr.setAttribute("aria-label",r.area+": "+r.ok+" de "+r.n+", "+r.pct+" por cento");
    const f=el("div","fill");f.style.width=r.pct+"%";
    f.style.background=r.pct>=70?"var(--acerto)":r.pct>=50?"var(--foco)":"var(--erro)";
    tr.append(f);row.append(head,tr);card.append(row);
  });
  box.append(card);return box;
}

/* ============================================================
   Aba Ajustes
   ============================================================ */
function viewAjustes(){
  const w=el("div");const card=el("div","card pad");
  const s=sess()||{};
  const b1=el("div","block");
  b1.append(el("p","field-label","Sua conta"));
  const quem=meuNome?meuNome+" ("+(s.email||"—")+")":(s.email||"—");
  b1.append(el("p","hint","Conectado como "+quem+". Tudo é salvo no servidor: qualquer aparelho onde você entrar com esta conta mostra o mesmo progresso."));
  const row=el("div");row.style.cssText="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px";
  if(ehAdmin){
    const pa=el("a","btn","Painel administrativo");pa.href="admin.html";
    pa.style.textDecoration="none";row.append(pa);
  }
  const rl=el("button","btn","Recarregar dados");rl.onclick=loadAll;
  const out=el("button","btn","Sair");
  out.onclick=async()=>{
    // sair descarta a fila local: com pendências, avisar é obrigatório
    const aviso=pendentes?" Atenção: "+plural(pendentes,"alteração ainda não subiu","alterações ainda não subiram")+" ao servidor e será(ão) perdida(s) se você sair agora — aguarde o selo mostrar “salvo”.":"";
    if(await askConfirm("Sair da conta?","Seu progresso está salvo no servidor e continua lá."+aviso,{okText:"Sair",danger:!!pendentes}))forceLogout()};
  row.append(rl,out);b1.append(row);card.append(b1);

  const b2=el("div","block");
  const cls=Q.filter(q=>!q.anulada&&q.disciplina).length;
  b2.append(el("p","field-label","Banco de questões"));
  const st=el("div");st.style.cssText="display:flex;gap:22px;flex-wrap:wrap;font-size:13.5px;color:var(--ink-soft)";
  const mk=(n,l)=>{const d=el("div");const b=el("b",null,String(n));b.style.cssText="color:var(--ink);font-size:16px";d.append(b,document.createTextNode(" "+l));return d};
  st.append(mk(Q.filter(q=>!q.anulada).length,"válidas"),mk(Q.filter(q=>q.anulada).length,"anuladas"),mk(cls,"classificadas"));
  b2.append(st);
  b2.append(el("p","hint","A lista de questões vem do servidor a cada abertura, então novas questões e reclassificações aparecem na hora. O enunciado é baixado sob demanda e fica em cache neste aparelho até você sair. O app precisa de conexão."));
  card.append(b2);

  const b3=el("div","block");
  b3.append(el("p","field-label","Exportar"));
  b3.append(el("p","hint","Baixe uma cópia do seu progresso (respostas, marcadas e cadernos) em JSON."));
  const ex=el("button","btn","Baixar meu progresso");ex.style.marginTop="10px";ex.onclick=exportar;
  b3.append(ex);card.append(b3);

  const b4=el("div","block");
  b4.append(el("p","field-label","Como o app funciona"));
  b4.append(el("p","hint","O manual inteiro, por tópico. Também abre pelo “?” no topo — ou pela tecla ? durante uma sessão."));
  const aj=ajudaLista(null);aj.style.marginTop="12px";
  b4.append(aj);card.append(b4);

  const b5=el("div","block");
  b5.append(el("p","field-label","Zona de risco"));
  const rp=el("button","btn danger","Apagar meu progresso");
  rp.onclick=async()=>{
    const n=answers.size;
    if(!n){toast("Não há progresso para apagar");return}
    if(await askConfirm("Apagar todo o progresso?",plural(n,"resposta será apagada","respostas serão apagadas")+", junto com o agendamento de revisão, em todos os aparelhos. Marcadas, cadernos e a classificação são mantidos. Não dá para desfazer.",{okText:"Apagar progresso",danger:true})){
      answers.clear();reviews.clear();localStorage.removeItem(LS_RUN);run=null;mode="montar";
      toast("Progresso apagado");render();
      push({method:"DELETE",path:"/rest/v1/answers?user_id=eq."+sess().user_id});
      push({method:"DELETE",path:"/rest/v1/reviews?user_id=eq."+sess().user_id});
    }
  };
  b5.append(rp);card.append(b5);
  w.append(card);return w;
}
function exportar(){
  const data={exportado_em:new Date().toISOString(),conta:(sess()||{}).email,
    respostas:[...answers.entries()].map(([id,a])=>({questao:id,resposta:a.resposta,correta:a.correta,em:a.at})),
    marcadas:[...marks],
    cadernos:cadernos.map(c=>({nome:c.nome,questoes:[...c.items]}))};
  const b=new Blob([JSON.stringify(data,null,1)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);
  a.download="banca-oab-progresso-"+new Date().toISOString().slice(0,10)+".json";
  document.body.append(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast("Arquivo gerado");
}

/* ============================================================
   Navegação por abas + teclado
   ============================================================ */
function selectTab(v){
  view=v;
  document.querySelectorAll("nav.tabs button").forEach(b=>{
    const on=b.dataset.view===v;
    b.setAttribute("aria-selected",on?"true":"false");
    b.tabIndex=on?0:-1;                      // tablist = um único ponto de tabulação
  });
  const m=document.getElementById("main");
  if(m)m.setAttribute("aria-labelledby","tab-"+v);
  render();
}
function wireTabs(){
  const tabs=[...document.querySelectorAll("nav.tabs button")];
  tabs.forEach((b,i)=>{
    b.onclick=()=>selectTab(b.dataset.view);
    b.onkeydown=e=>{
      const d=e.key==="ArrowRight"?1:e.key==="ArrowLeft"?-1:0;
      if(!d)return;e.preventDefault();
      const n=tabs[(i+d+tabs.length)%tabs.length];n.focus();selectTab(n.dataset.view);
    };
  });
}
function onKey(e){
  if(modalOpen||!ready)return;
  const t=e.target;
  if(t&&(t.tagName==="INPUT"||t.tagName==="SELECT"||t.tagName==="TEXTAREA"||t.isContentEditable))return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==="?"){e.preventDefault();abrirAjuda("atalhos");return}
  // sem o teste de aba, teclar "1" no Mapa respondia a questão da sessão aberta
  // por baixo, sem nada na tela para indicar isso
  if(view!=="estudar"||mode!=="rodar"||!run||run.done)return;
  const list=runList();if(!list.length)return;
  const q=list[run.i];if(!temConteudo(q))return;
  const isSim=run.modo==="simulado";
  const sel=run.respostas[q.id]||null;
  const revealed=!isSim&&!!sel;
  // 1–4 espelham A–D (ergonomia: a fileira numérica fica sob a mão; as letras
  // A/B/C/D ficam espalhadas). Cobre teclado principal e numérico, pois e.key
  // devolve o mesmo dígito nos dois. Os atalhos de letra continuam valendo.
  let k=e.key.toUpperCase();
  const NUM={"1":"A","2":"B","3":"C","4":"D"};
  if(NUM[k])k=NUM[k];
  if(["A","B","C","D"].includes(k)&&!revealed&&temConteudo(q)&&q.alternativas[k]){
    e.preventDefault();chosen=k;chosenFor=q.id;
    if(isSim){run.respostas[q.id]=k;saveRun()}
    render();announce("Alternativa "+k+" selecionada");return;
  }
  if(k==="M"){e.preventDefault();toggleMark(q);return}
  if(e.key==="ArrowLeft"&&run.i>0){e.preventDefault();goTo(run.i);return}
  if(e.key==="ArrowRight"&&run.i<list.length-1){e.preventDefault();goTo(run.i+2);return}
  if(e.key==="Enter"){
    e.preventDefault();
    if(!revealed&&chosen&&!isSim){answerNow(q);return}
    if(run.i<list.length-1){goTo(run.i+2);return}
    // Última questão do simulado: antes o Enter era engolido e a pessoa
    // precisava alcançar o mouse para "Ir para correção" — justo no fim de
    // uma sessão inteira de teclado. Vai pelo caminho com confirmação.
    if(isSim){confirmaFinalizaSim(list);return}
    if(!isSim&&revealed){run.done=true;if(run.tempoFinal==null)run.tempoFinal=Date.now()-run.startedAt;saveRun();render()}
    return;
  }
}

   Início

function boot(){
  wireTabs();
  document.getElementById("helpbtn").onclick=()=>abrirAjuda(null);
  document.getElementById("syncpill").onclick=()=>abrirAjuda("offline");
  document.addEventListener("keydown",onKey);
  render();
  if(configured()&&authed())loadAll();
}
boot();
